<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>로그인 — 도장 걸이 시뮬레이션</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;}
.title{font-size:18px;font-weight:500;margin-bottom:6px;}
.sub{font-size:13px;color:#888;margin-bottom:2rem;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;text-align:left;}
.field label{font-size:12px;color:#888;}
.field input{border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:16px;letter-spacing:0.2em;text-align:center;width:100%;}
.field input:focus{outline:none;border-color:#1a1a1a;}
.btn{width:100%;padding:11px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:15px;cursor:pointer;margin-top:4px;}
.btn:hover{background:#333;}
.err{font-size:12px;color:#A32D2D;margin-top:8px;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="title">도장 걸이 수량 시뮬레이션</div>
  <div class="sub">접근하려면 비밀번호를 입력하세요</div>
  <div class="field">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="····" maxlength="20" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" onclick="login()">입장</button>
  <div class="err" id="err"></div>
</div>
<script>
function login(){
  const pw=document.getElementById('pw').value;
  if(pw==='6720'){
    document.cookie='auth=6720;path=/;max-age='+60*60*24*36500;
    window.location.href='/';
  } else {
    document.getElementById('err').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
window.onload=()=>document.getElementById('pw').focus();
</script>
</body>
</html>
